<div class="p-6 bg-white rounded-2xl shadow-lg border-l-4 border-t border-r border-b border-gray-100
            hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
     [ngClass]="borderClass">
  <div class="flex items-start gap-4">
    <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center"
         [ngClass]="accentColor === 'green' ? 'bg-accent-green/10' : accentColor === 'purple' ? 'bg-accent-purple/10' : 'bg-primary/10'">
      <mat-icon [ngClass]="iconClass">{{ icon }}</mat-icon>
    </div>
    <div>
      <h3 class="text-lg font-bold text-gray-900 mb-2">{{ title }}</h3>
      <p class="text-sm text-gray-600 leading-relaxed">{{ description }}</p>
    </div>
  </div>
</div>
