<div class="relative rounded-2xl overflow-hidden bg-gradient-to-br from-gray-100 to-gray-200 border border-gray-200 shadow-lg"
     [style.aspect-ratio]="aspectRatio">
  <img *ngIf="imageSrc && !imageError"
       [src]="imageSrc"
       [alt]="imageAlt || label"
       (error)="imageError = true"
       class="absolute inset-0 w-full h-full object-cover">
  <div *ngIf="!imageSrc || imageError"
       class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
    <mat-icon class="text-5xl mb-2">{{ icon }}</mat-icon>
    <span class="text-sm font-medium">{{ label }}</span>
  </div>
</div>
